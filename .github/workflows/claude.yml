name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # Guardrail: hard wall-clock cap — GitHub kills the job after this regardless of agent state.
    # Raised from 20 → 30: BE-02-sized tickets (entity + EF migration + services + tests) need
    # room to build/test/migrate and still finish before the wall-clock cap.
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # So Claude can build and run unit tests as its own pre-PR self-check.
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core tools
        run: dotnet tool install -g dotnet-ef

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Guardrail: cap agent iterations so it can't loop forever on a fix it can't solve.
          # --max-turns raised 25 → 40: a full BE ticket (code + EF migration + unit & integration
          #   tests + self-verify) doesn't fit in 25 turns; the BE-02 run hit error_max_turns.
          # Tool permissions (what dotnet/git commands the agent may run) now live in the
          #   version-controlled .claude/settings.json permissions.allow/deny — one source of truth
          #   that applies both here in CI and in local Claude Code sessions.
          claude_args: |
            --max-turns 40
            --verbose


          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

