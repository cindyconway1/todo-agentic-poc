name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    # Guardrail: hard wall-clock cap — GitHub kills the job after this regardless of agent state.
    # Raised 20 → 30 → 45: the 40-turn BE-02 run died on the *turn* cap at 8.2 min with the clock
    # barely touched, so the bottleneck is turns, not minutes — but raising --max-turns to 90 needs
    # matching wall-clock headroom for slow cold-restore build/test cycles. 45 keeps a real cap.
    timeout-minutes: 45
    permissions:
      contents: write
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # So Claude can build and run unit tests as its own pre-PR self-check.
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install EF Core tools
        run: dotnet tool install -g dotnet-ef

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Guardrail: cap agent iterations so it can't loop forever on a fix it can't solve.
          # --max-turns raised 25 → 40 → 90: the 40-turn run hit error_max_turns still mid-code
          #   (branch never pushed, work lost). A full BE ticket (≈10 files + EF migration + two
          #   test projects + build/test/fix cycles + push) needs the larger budget. Bounded by the
          #   45-min wall-clock above so a stuck run still terminates.
          #
          # Tool permissions MUST be declared here via --allowedTools. The Action does NOT honor
          #   .claude/settings.json permissions.allow for gating Bash in the non-interactive run
          #   (see anthropics/claude-code-action FAQ). Bash is disabled by default.
          #   The prior run wasted 10 of 41 turns on denied commands: the allowlist covered dotnet
          #   but not the ordinary file ops an implementation needs (mkdir/mv/cp/rm/cat/ls/find/
          #   sed/grep). Granting those below stops the denial-thrash. Destructive ops stay denied.
          #   .claude/settings.json still governs *local* interactive Claude Code sessions.
          claude_args: |
            --max-turns 90
            --verbose
            --allowedTools "Bash(dotnet:*),Bash(git:*),Bash(mkdir:*),Bash(mv:*),Bash(cp:*),Bash(rm:*),Bash(cat:*),Bash(ls:*),Bash(find:*),Bash(sed:*),Bash(grep:*),Bash(echo:*),Bash(test:*),Bash(pwd:*)"
            --disallowedTools "Bash(dotnet nuget push:*),Bash(git push:*),Bash(rm -rf /:*)"


          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

