name: CI
on:
  pull_request: { types: [opened, synchronize] }
  push: { branches: [main] }
jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      sql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env: { ACCEPT_EULA: "Y", MSSQL_SA_PASSWORD: "Your_strong_Pass123" }
        ports: ["1433:1433"]
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_Pass123 -No -Q 'SELECT 1' || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - run: dotnet build --configuration Release
      - run: dotnet test tests/ToDo.UnitTests --configuration Release
      - name: Integration tests
        env:
          ConnectionStrings__Default: "Server=localhost,1433;Database=ToDoDb;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True"
        run: dotnet test tests/ToDo.IntegrationTests --configuration Release