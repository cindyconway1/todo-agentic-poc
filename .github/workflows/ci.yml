name: CI
on:
  pull_request: { types: [opened, synchronize] }
  push: { branches: [main] }
jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to create/update the api-schema-latest release
    services:
      sql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env: { ACCEPT_EULA: "Y", MSSQL_SA_PASSWORD: "Your_strong_Pass123" }
        ports: ["1433:1433"]
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_strong_Pass123 -No -Q 'SELECT 1' || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '10.0.x' }
      - run: dotnet build --configuration Release
      - name: Verify committed OpenAPI schema is up to date
        # The build regenerates ToDo.Api.json from the C# API surface. If it differs
        # from the committed copy, someone changed the API without committing the fresh
        # schema. Fail here (on PRs too) so drift is caught before merge.
        run: git diff --exit-code -- ToDo.Api.json
      - name: Unit + smoke tests (with coverage floor)
        run: |
          dotnet test tests/ToDo.UnitTests --configuration Release \
            --collect:"XPlat Code Coverage" --results-directory ./TestResults
          # Coverage floor: a tripwire against a green-but-testless suite (e.g. only empty stubs),
          # NOT a quality target. Current coverage is ~0.28; floor sits below with headroom.
          rate=$(grep -o 'line-rate="[0-9.]*"' TestResults/*/coverage.cobertura.xml | head -1 | grep -o '[0-9.]*')
          echo "Unit+smoke line coverage: $rate (floor 0.20)"
          awk "BEGIN{exit !($rate >= 0.20)}" || { echo "::error::Unit line coverage $rate is below the 0.20 floor — are real tests present?"; exit 1; }
      - name: Integration tests
        env:
          ConnectionStrings__Default: "Server=localhost,1433;Database=ToDoDb;User Id=sa;Password=Your_strong_Pass123;TrustServerCertificate=True"
        run: dotnet test tests/ToDo.IntegrationTests --configuration Release
      - name: Publish OpenAPI schema as rolling release asset
        # Only on push to main, and only after build + all tests above have passed.
        # Re-points the api-schema-latest tag to this commit and replaces the asset.
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: api-schema-latest
          name: API Schema (latest)
          body: OpenAPI schema for the ToDo API, auto-published from main.
          files: ToDo.Api.json
          make_latest: false